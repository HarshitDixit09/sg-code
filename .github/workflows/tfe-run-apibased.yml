name: Terraform Enterprise Immutable Pipeline

on:
  push:
    branches:
      - main

jobs:

  terraform-plan:

    name: Terraform Plan

    runs-on: ubuntu-latest

    outputs:
      run_id: ${{ steps.create_run.outputs.run_id }}

    steps:

      - name: Create TFE Run
        id: create_run
        run: |

          echo "Creating TFE Run"

          response=$(curl --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${{ secrets.TFE_TOKEN }}" \
            --header "Content-Type: application/vnd.api+json" \
            --data @- \
            https://${{ secrets.TFE_HOSTNAME }}/api/v2/runs <<EOF
          {
            "data": {
              "type": "runs",
              "attributes": {
                "message": "Triggered from GitHub Actions"
              },
              "relationships": {
                "workspace": {
                  "data": {
                    "type": "workspaces",
                    "id": "${{ secrets.TFE_WORKSPACE_ID }}"
                  }
                }
              }
            }
          }
          EOF
          )

          echo "FULL RESPONSE:"
          echo "$response"

          run_id=$(echo "$response" | jq -r '.data.id')

          echo "RUN ID: $run_id"

          if [[ "$run_id" == "null" || -z "$run_id" ]]; then
            echo "Failed to create TFE run"
            exit 1
          fi

          echo "run_id=$run_id" >> $GITHUB_OUTPUT


      - name: Wait For Plan Completion
        run: |

          run_id="${{ steps.create_run.outputs.run_id }}"

          while true
          do

            response=$(curl --silent \
              --header "Authorization: Bearer ${{ secrets.TFE_TOKEN }}" \
              https://${{ secrets.TFE_HOSTNAME }}/api/v2/runs/$run_id)

            echo "$response"

            status=$(echo "$response" | jq -r '.data.attributes.status')

            echo "Current Run Status: $status"

            case "$status" in

              planned|planned_and_finished|planned_and_saved|policy_checked)
                echo "Plan completed successfully"
                break
                ;;

              errored|canceled)
                echo "Run failed"
                exit 1
                ;;

            esac

            sleep 15

          done


      - name: Print TFE Run URL
        run: |

          run_id="${{ steps.create_run.outputs.run_id }}"

          echo "TFE Run URL:"
          echo "https://${{ secrets.TFE_HOSTNAME }}/app/runs/$run_id"



  terraform-apply:

    name: Terraform Apply

    needs: terraform-plan

    runs-on: ubuntu-latest

    environment:
      name: production

    steps:

      - name: Apply Approved TFE Run
        run: |

          run_id="${{ needs.terraform-plan.outputs.run_id }}"

          echo "Applying Run ID: $run_id"

          response=$(curl --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${{ secrets.TFE_TOKEN }}" \
            --header "Content-Type: application/vnd.api+json" \
            https://${{ secrets.TFE_HOSTNAME }}/api/v2/runs/$run_id/actions/apply)

          echo "APPLY RESPONSE:"
          echo "$response"
