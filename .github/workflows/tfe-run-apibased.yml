name: Terraform Enterprise Immutable Pipeline

on:
  push:
    branches:
      - main

jobs:

  terraform-plan:

    name: Terraform Plan

    runs-on: ubuntu-latest

    outputs:
      run_id: ${{ steps.create_run.outputs.run_id }}

    steps:

      - name: Create TFE Run
        id: create_run
        run: |

          echo "Creating TFE Run..."

          response=$(curl --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${{ secrets.TFE_TOKEN }}" \
            --header "Content-Type: application/vnd.api+json" \
            --data @- \
            https://${{ secrets.TFE_HOSTNAME }}/api/v2/runs <<EOF
          {
            "data": {
              "type": "runs",
              "attributes": {
                "message": "Triggered from GitHub Actions"
              },
              "relationships": {
                "workspace": {
                  "data": {
                    "type": "workspaces",
                    "id": "${{ secrets.TFE_WORKSPACE_ID }}"
                  }
                }
              }
            }
          }
          EOF
          )

          echo "FULL API RESPONSE:"
          echo "$response"

          run_id=$(echo "$response" | jq -r '.data.id')

          echo "RUN ID: $run_id"

          if [[ -z "$run_id" || "$run_id" == "null" ]]; then
            echo "Failed to create run"
            exit 1
          fi

          echo "run_id=$run_id" >> $GITHUB_OUTPUT



      - name: Wait For Plan Completion
        run: |

          run_id="${{ steps.create_run.outputs.run_id }}"

          echo "Waiting for TFE plan completion..."

          while true
          do

            response=$(curl --silent \
              --header "Authorization: Bearer ${{ secrets.TFE_TOKEN }}" \
              https://${{ secrets.TFE_HOSTNAME }}/api/v2/runs/$run_id)

            status=$(echo "$response" | jq -r '.data.attributes.status')

            confirmable=$(echo "$response" | jq -r '.data.attributes.actions.is-confirmable')

            echo "Current Run Status: $status"
            echo "Is Confirmable: $confirmable"

            if [[ "$confirmable" == "true" ]]; then
              echo "Plan completed successfully"
              break
            fi

            case "$status" in

              errored|canceled|discarded)
                echo "Run failed"
                exit 1
                ;;

            esac

            sleep 15

          done



      - name: Print TFE Run URL
        run: |

          run_id="${{ steps.create_run.outputs.run_id }}"

          echo ""
          echo "========================================"
          echo "TFE RUN READY FOR APPROVAL"
          echo "========================================"
          echo ""
          echo "https://${{ secrets.TFE_HOSTNAME }}/app/runs/$run_id"
          echo ""



  terraform-apply:

    name: Terraform Apply

    needs: terraform-plan

    runs-on: ubuntu-latest

    environment:
      name: production

    steps:

      - name: Apply Approved TFE Run
        run: |

          run_id="${{ needs.terraform-plan.outputs.run_id }}"

          echo "Applying Run ID: $run_id"

          response=$(curl --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${{ secrets.TFE_TOKEN }}" \
            --header "Content-Type: application/vnd.api+json" \
            https://${{ secrets.TFE_HOSTNAME }}/api/v2/runs/$run_id/actions/apply)

          echo "APPLY RESPONSE:"
          echo "$response"



      - name: Wait For Apply Completion
        run: |

          run_id="${{ needs.terraform-plan.outputs.run_id }}"

          echo "Waiting for apply completion..."

          while true
          do

            response=$(curl --silent \
              --header "Authorization: Bearer ${{ secrets.TFE_TOKEN }}" \
              https://${{ secrets.TFE_HOSTNAME }}/api/v2/runs/$run_id)

            status=$(echo "$response" | jq -r '.data.attributes.status')

            echo "Current Run Status: $status"

            case "$status" in

              applied)
                echo "Apply completed successfully"
                break
                ;;

              errored|canceled|discarded)
                echo "Apply failed"
                exit 1
                ;;

            esac

            sleep 15

          done



      - name: Print Final Run URL
        run: |

          run_id="${{ needs.terraform-plan.outputs.run_id }}"

          echo ""
          echo "========================================"
          echo "TFE APPLY COMPLETED"
          echo "========================================"
          echo ""
          echo "https://${{ secrets.TFE_HOSTNAME }}/app/runs/$run_id"
          echo ""
